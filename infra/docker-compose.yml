services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

    # --- 추가 권장(로컬 단일 노드 안정화) ---
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    # KRaft cluster id (고정 권장)
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "9094:9094"   # 외부 접근용 (Picook EC2 → Lighthouse Kafka)
      
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=lighthouse
      - CLICKHOUSE_PASSWORD=chpass
      - CLICKHOUSE_DB=lighthouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    depends_on:
      - kafka

  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: vector
    command: ["-c", "/etc/vector/vector.yaml"]
    restart: unless-stopped
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ${LOG_SOURCE_PATH:-./../logs}:/var/log/apps:ro
      - vector-data:/var/lib/vector
    depends_on:
      - kafka
      
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: oracle
    environment:
      - ORACLE_PASSWORD=oraclepass # 관리자(SYS, SYSTEM) 비밀번호
      - APP_USER=lighthouse # 애플리케이션용 사용자 계정 자동 생성
      - APP_USER_PASSWORD=lighthousepass # 애플리케이션용 계정 비밀번호
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      
  # --- Lighthouse Application ---
  lighthouse-be:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    container_name: lighthouse-be
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_INCLUDE=secrets
      - PICOOK_BASE_URL=${PICOOK_BASE_URL:-http://host.docker.internal:8080}
      - ALERT_ENABLED=${ALERT_ENABLED:-false}
      - INIT_ADMIN_ENABLED=${INIT_ADMIN_ENABLED:-true}
    volumes:
      - ../app/backend/src/main/resources/application-secrets.yml:/app/config/application-secrets.yml:ro
    depends_on:
      - kafka
      - clickhouse
      - oracle
    restart: unless-stopped

  lighthouse-fe:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    container_name: lighthouse-fe
    ports:
      - "3030:3030"
    depends_on:
      - lighthouse-be
    restart: unless-stopped

volumes:
  clickhouse-data:
  vector-data:
  oracle-data: