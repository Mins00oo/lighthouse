services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

    # --- 추가 권장(로컬 단일 노드 안정화) ---
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    # KRaft cluster id (고정 권장)
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=lighthouse
      - CLICKHOUSE_PASSWORD=chpass
      - CLICKHOUSE_DB=lighthouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    depends_on:
      kafka:
        condition: service_healthy

  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: vector
    command: ["-c", "/etc/vector/vector.yaml"]
    restart: unless-stopped
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ${LOG_SOURCE_PATH:-./../logs}:/var/log/apps:ro
      - vector-data:/var/lib/vector
    depends_on:
      kafka:
        condition: service_healthy
      
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: oracle
    environment:
      - ORACLE_PASSWORD=oraclepass # 관리자(SYS, SYSTEM) 비밀번호
      - APP_USER=lighthouse # 애플리케이션용 사용자 계정 자동 생성
      - APP_USER_PASSWORD=lighthousepass # 애플리케이션용 계정 비밀번호
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      
volumes:
  clickhouse-data:
  vector-data:
  oracle-data: