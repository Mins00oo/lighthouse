server:
  port: 9090

spring:
  application:
    name: Lighthouse_BE
  profiles:
    include: secrets

  # Oracle DataSource (Primary - 앱 메타데이터)
  datasource:
    hikari:
      driver-class-name: oracle.jdbc.OracleDriver
      pool-name: oracle-pool
      minimum-idle: 2

# ClickHouse DataSource (로그 데이터)
clickhouse:
  datasource:
    hikari:
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      pool-name: clickhouse-pool
      minimum-idle: 2

app:
  init-admin:
    enabled: ${INIT_ADMIN_ENABLED:true}

websocket:
  endpoint: /ws

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

lighthouse:
  health:
    check-interval-ms: ${HEALTH_CHECK_INTERVAL_MS:60000}
  metric:
    collect-interval-ms: ${METRIC_COLLECT_INTERVAL_MS:60000}
  business:
    collect-interval-ms: ${BUSINESS_COLLECT_INTERVAL_MS:300000}
  targets:
    - name: picook-backend
      base-url: ${PICOOK_BASE_URL:http://localhost:8080}
      health-path: /actuator/health
      prometheus-path: /actuator/prometheus
      info-path: /actuator/info
      business-paths:
        - /api/monitoring/users
        - /api/monitoring/dashboard
        - /api/monitoring/shorts
  alert:
    enabled: ${ALERT_ENABLED:false}
    check-interval-ms: ${ALERT_CHECK_INTERVAL_MS:600000}
    cooldown-ms: ${ALERT_COOLDOWN_MS:600000}
    slack:
      channel: ${SLACK_CHANNEL:#lighthouse-alerts}
    rules:
      error-rate:
        enabled: true
        threshold-multiplier: 3.0
        min-request-count: 50
        fallback-absolute-rate: 0.05
      response-time:
        enabled: true
        p95-threshold-ms: 3000
        min-request-count: 50
      api-failure:
        enabled: true
        consecutive-count: 5
      server-down:
        enabled: true
        consecutive-down-count: 3
      resource-threshold:
        enabled: true
        cpu-warning: 80.0
        cpu-critical: 95.0
        memory-warning: 85.0
        memory-critical: 95.0
        disk-critical-percent: 10.0
        hikari-warning: 80.0

logging:
  level:
    com.app.lighthouse: DEBUG
    com.clickhouse: WARN
